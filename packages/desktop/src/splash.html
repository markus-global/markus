<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; align-items: center; justify-content: center; height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f0f23; color: #e2e8f0;
  -webkit-app-region: drag;
}
.container { text-align: center; }
.logo {
  width: 80px; height: 80px; margin: 0 auto 24px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 20px; display: flex; align-items: center; justify-content: center;
  font-size: 40px; font-weight: bold; color: #fff;
}
h1 { font-size: 28px; margin-bottom: 12px; }
.spinner {
  width: 28px; height: 28px; border: 3px solid #334155;
  border-top-color: #667eea; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 24px auto 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
#status { font-size: 14px; color: #94a3b8; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">M</div>
  <h1>Markus</h1>
  <div class="spinner"></div>
  <p id="status">Starting server...</p>
</div>
</body>
</html>
