appId: com.markus.desktop
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
productName: Markus
directories:
  output: dist-electron
  buildResources: build
files:
  - dist/**/*
  - "!dist/**/*.map"
asar: true
asarUnpack:
  - dist/preload.js
  - dist/splash.html
  - dist/icon.png
  - dist/templates/**
  - dist/markus-browser-extension.zip
  - dist/data/**
compression: maximum

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  icon: build/icon.icns

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  executableName: markus
  target:
    - target: AppImage
      arch: [x64]
  category: Development
  icon: build/icon.png

publish:
  provider: github
  owner: markus-global
  repo: markus
