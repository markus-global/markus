<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markus - AI Digital Employee Platform</title>
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-card: #21242f;
      --bg-hover: #2a2e3a;
      --border: #2e3242;
      --text-primary: #e4e6eb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-nav {
      padding: 12px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
      margin-bottom: 2px;
    }

    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: white; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Main Content */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      height: 60px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: var(--bg-secondary);
    }

    .topbar h2 { font-size: 18px; font-weight: 600; }

    .content { flex: 1; overflow-y: auto; padding: 28px; }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: all 0.2s;
    }

    .card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title { font-size: 16px; font-weight: 600; }
    .card-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-idle { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge-working { background: rgba(99,102,241,0.15); color: var(--accent-hover); }
    .badge-offline { background: rgba(107,114,128,0.15); color: var(--text-muted); }
    .badge-error { background: rgba(239,68,68,0.15); color: var(--danger); }

    .card-stats {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .stat { text-align: center; flex: 1; }
    .stat-value { font-size: 18px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 5px 12px; font-size: 13px; }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid transparent; }
    .btn-danger:hover { border-color: var(--danger); }

    .btn-group { display: flex; gap: 8px; }

    /* Task Board */
    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .board-column {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 200px;
    }

    .board-column-header {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .board-column-count {
      background: var(--bg-hover);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .task-card:hover { border-color: var(--accent); }
    .task-title { font-size: 14px; font-weight: 500; }
    .task-meta { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

    .priority-urgent { border-left: 3px solid var(--danger); }
    .priority-high { border-left: 3px solid var(--warning); }
    .priority-medium { border-left: 3px solid var(--info); }
    .priority-low { border-left: 3px solid var(--text-muted); }

    /* Chat */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 120px);
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .chat-msg {
      margin-bottom: 16px;
      max-width: 75%;
    }

    .chat-msg.user { margin-left: auto; }
    .chat-msg.agent { margin-right: auto; }

    .chat-bubble {
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .user .chat-bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .agent .chat-bubble { background: var(--bg-hover); border-bottom-left-radius: 4px; }

    .chat-sender { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }

    .chat-input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }

    .chat-input:focus { border-color: var(--accent); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 480px;
      max-width: 90vw;
      box-shadow: var(--shadow);
    }

    .modal h3 { font-size: 18px; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }

    .form-input, .form-select {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }

    .form-input:focus, .form-select:focus { border-color: var(--accent); }

    .hidden { display: none !important; }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-card .stat-value { font-size: 28px; font-weight: 700; }
    .stat-card .stat-label { font-size: 13px; color: var(--text-muted); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { padding: 16px; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Markus</h1>
        <p>AI Digital Employee Platform</p>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard" onclick="showPage('dashboard')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </div>
        <div class="nav-item" data-page="agents" onclick="showPage('agents')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Agents
        </div>
        <div class="nav-item" data-page="tasks" onclick="showPage('tasks')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Task Board
        </div>
        <div class="nav-item" data-page="chat" onclick="showPage('chat')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat
        </div>
        <div class="nav-item" data-page="roles" onclick="showPage('roles')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Roles
        </div>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="openHireModal()">+ Hire Agent</button>
        </div>
      </div>

      <div class="content">
        <!-- Dashboard -->
        <div id="page-dashboard">
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-value" id="stat-agents">0</div>
              <div class="stat-label">Active Agents</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-tasks">0</div>
              <div class="stat-label">Pending Tasks</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-completed">0</div>
              <div class="stat-label">Completed Today</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-roles">0</div>
              <div class="stat-label">Available Roles</div>
            </div>
          </div>
          <h3 style="margin-bottom:16px">Digital Employees</h3>
          <div class="card-grid" id="agent-cards"></div>
        </div>

        <!-- Agents Page -->
        <div id="page-agents" class="hidden">
          <div class="card-grid" id="agents-list"></div>
        </div>

        <!-- Tasks Page -->
        <div id="page-tasks" class="hidden">
          <div class="board" id="task-board"></div>
        </div>

        <!-- Chat Page -->
        <div id="page-chat" class="hidden">
          <div style="margin-bottom:12px">
            <select class="form-select" id="chat-agent-select" style="width:300px" onchange="selectChatAgent()">
              <option value="">Select an agent to chat with...</option>
            </select>
          </div>
          <div class="chat-container">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
              <input class="chat-input" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()" />
              <button class="btn btn-primary" onclick="sendChat()">Send</button>
            </div>
          </div>
        </div>

        <!-- Roles Page -->
        <div id="page-roles" class="hidden">
          <div class="card-grid" id="roles-list"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Hire Modal -->
  <div class="modal-overlay hidden" id="hire-modal">
    <div class="modal">
      <h3>Hire a Digital Employee</h3>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="hire-name" placeholder="e.g. Alice" />
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-select" id="hire-role"></select>
      </div>
      <div class="btn-group" style="justify-content:flex-end;margin-top:24px">
        <button class="btn btn-outline" onclick="closeHireModal()">Cancel</button>
        <button class="btn btn-primary" onclick="hireAgent()">Hire</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost'
      ? `http://localhost:3001`
      : `${window.location.protocol}//${window.location.hostname}:3001`;

    let chatAgentId = '';
    let chatHistory = [];

    function showPage(page) {
      document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(`page-${page}`).classList.remove('hidden');
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-page="${page}"]`).classList.add('active');

      const titles = {
        dashboard: 'Dashboard',
        agents: 'Digital Employees',
        tasks: 'Task Board',
        chat: 'Chat',
        roles: 'Role Templates'
      };
      document.getElementById('page-title').textContent = titles[page] || page;

      if (page === 'tasks') loadTaskBoard();
      if (page === 'roles') loadRoles();
      if (page === 'chat') loadChatAgents();
    }

    async function api(path, opts = {}) {
      try {
        const res = await fetch(`${API}${path}`, {
          headers: { 'Content-Type': 'application/json' },
          ...opts,
          body: opts.body ? JSON.stringify(opts.body) : undefined,
        });
        return await res.json();
      } catch (e) {
        console.error('API error:', e);
        return null;
      }
    }

    async function loadDashboard() {
      const [agentsData, rolesData, tasksData] = await Promise.all([
        api('/api/agents'),
        api('/api/roles'),
        api('/api/taskboard'),
      ]);

      const agents = agentsData?.agents || [];
      const roles = rolesData?.roles || [];
      const board = tasksData?.board || {};

      document.getElementById('stat-agents').textContent = agents.length;
      document.getElementById('stat-roles').textContent = roles.length;
      document.getElementById('stat-tasks').textContent = (board.pending?.length || 0) + (board.assigned?.length || 0);
      document.getElementById('stat-completed').textContent = board.completed?.length || 0;

      renderAgentCards(agents, 'agent-cards');
      renderAgentCards(agents, 'agents-list');
    }

    function renderAgentCards(agents, containerId) {
      const container = document.getElementById(containerId);
      if (!agents.length) {
        container.innerHTML = `
          <div class="card" style="grid-column:1/-1;text-align:center;padding:48px">
            <p style="color:var(--text-muted);font-size:16px">No digital employees yet.</p>
            <p style="color:var(--text-muted);font-size:14px;margin-top:8px">Click "Hire Agent" to get started.</p>
          </div>`;
        return;
      }

      container.innerHTML = agents.map(a => `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">${a.name}</div>
              <div class="card-subtitle">${a.role}</div>
            </div>
            <span class="badge badge-${a.status}">${a.status}</span>
          </div>
          <div class="card-stats">
            <div class="btn-group">
              <button class="btn btn-sm btn-outline" onclick="startAgent('${a.id}')">Start</button>
              <button class="btn btn-sm btn-outline" onclick="stopAgent('${a.id}')">Stop</button>
              <button class="btn btn-sm btn-danger" onclick="fireAgent('${a.id}')">Remove</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function loadTaskBoard() {
      const data = await api('/api/taskboard');
      const board = data?.board || {};
      const container = document.getElementById('task-board');

      const columns = ['pending', 'assigned', 'in_progress', 'completed'];
      container.innerHTML = columns.map(status => `
        <div class="board-column">
          <div class="board-column-header">
            ${status.replace('_', ' ')}
            <span class="board-column-count">${(board[status] || []).length}</span>
          </div>
          ${(board[status] || []).map(t => `
            <div class="task-card priority-${t.priority}">
              <div class="task-title">${t.title}</div>
              <div class="task-meta">${t.priority} priority${t.assignedAgentId ? ' | assigned' : ''}</div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    async function loadRoles() {
      const data = await api('/api/roles');
      const roles = data?.roles || [];
      const container = document.getElementById('roles-list');

      if (!roles.length) {
        container.innerHTML = '<p style="color:var(--text-muted)">No role templates found.</p>';
        return;
      }

      container.innerHTML = roles.map(r => `
        <div class="card">
          <div class="card-title">${r}</div>
          <div class="card-subtitle" style="margin-top:8px">Built-in role template</div>
        </div>
      `).join('');
    }

    async function loadChatAgents() {
      const data = await api('/api/agents');
      const agents = data?.agents || [];
      const select = document.getElementById('chat-agent-select');
      select.innerHTML = '<option value="">Select an agent to chat with...</option>' +
        agents.map(a => `<option value="${a.id}">${a.name} (${a.role})</option>`).join('');
    }

    function selectChatAgent() {
      chatAgentId = document.getElementById('chat-agent-select').value;
      chatHistory = [];
      document.getElementById('chat-messages').innerHTML = '';
    }

    async function sendChat() {
      if (!chatAgentId) return alert('Please select an agent first');
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      appendChatMsg('You', text, 'user');

      const data = await api(`/api/agents/${chatAgentId}/message`, {
        method: 'POST',
        body: { text },
      });

      if (data?.reply) {
        appendChatMsg('Agent', data.reply, 'agent');
      }
    }

    function appendChatMsg(sender, text, type) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `chat-msg ${type}`;
      div.innerHTML = `
        <div class="chat-sender">${sender}</div>
        <div class="chat-bubble">${text.replace(/\n/g, '<br>')}</div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    async function openHireModal() {
      const data = await api('/api/roles');
      const roles = data?.roles || [];
      const select = document.getElementById('hire-role');
      select.innerHTML = roles.map(r => `<option value="${r}">${r}</option>`).join('');
      document.getElementById('hire-modal').classList.remove('hidden');
    }

    function closeHireModal() {
      document.getElementById('hire-modal').classList.add('hidden');
    }

    async function hireAgent() {
      const name = document.getElementById('hire-name').value.trim();
      const roleName = document.getElementById('hire-role').value;
      if (!name) return alert('Please enter a name');

      await api('/api/agents', { method: 'POST', body: { name, roleName } });
      closeHireModal();
      loadDashboard();
    }

    async function startAgent(id) {
      await api(`/api/agents/${id}/start`, { method: 'POST' });
      loadDashboard();
    }

    async function stopAgent(id) {
      await api(`/api/agents/${id}/stop`, { method: 'POST' });
      loadDashboard();
    }

    async function fireAgent(id) {
      if (!confirm('Are you sure you want to remove this agent?')) return;
      await api(`/api/agents/${id}`, { method: 'DELETE' });
      loadDashboard();
    }

    // Initial load
    loadDashboard();
  </script>
</body>
</html>
