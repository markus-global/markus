apiVersion: v1
kind: Service
metadata:
  name: markus-server
  namespace: markus
  labels:
    app: markus
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      name: api
    - port: 3002
      targetPort: 3002
      name: comm
    - port: 9000
      targetPort: 9000
      name: feishu-webhook
  selector:
    app: markus
    component: server
