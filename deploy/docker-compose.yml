version: "3.8"

services:
  markus:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: markus-server
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
      - "${COMM_PORT:-3002}:3002"
      - "${FEISHU_WEBHOOK_PORT:-9000}:9000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - markus-data:/app/.markus
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - markus-net

volumes:
  markus-data:

networks:
  markus-net:
    driver: bridge
