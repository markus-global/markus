services:
  markus:
    # Use pre-built image from Docker Hub (or build locally with `docker compose build`)
    image: markus/markus:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: markus-server
    restart: unless-stopped
    ports:
      - "${API_PORT:-8056}:8056"
      - "${COMM_PORT:-8058}:8058"
      - "${FEISHU_WEBHOOK_PORT:-9000}:9000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - markus-data:/app/.markus
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8056/api/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - markus-net

volumes:
  markus-data:

networks:
  markus-net:
    driver: bridge
