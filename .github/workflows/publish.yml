  #       with:
  #         username: ${{ secrets.DOCKERHUB_USERNAME }}
  #         password: ${{ secrets.DOCKERHUB_TOKEN }}
  #     - uses: docker/build-push-action@v6
  #       with:
  #         context: .
  #         push: true
  #         tags: |
  #           markus/markus:${{ steps.version.outputs.VERSION }}
  #           markus/markus:latest
  #         cache-from: type=gha
