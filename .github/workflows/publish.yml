  build-binaries:
    needs: publish-npm
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build Web UI
        run: pnpm --filter @markus/web-ui build

      - name: Bundle CLI for publishing
        run: pnpm --filter @markus-global/cli build:bundle

      - name: Import Apple certificates
        if: matrix.platform == 'darwin'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12" ]; then
            echo "⚠ Apple signing secrets not configured — skipping"
            exit 0
          fi

          KEYCHAIN="build-$$.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/productsign -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm /tmp/cert.p12

          # Export identities for later steps
          APP_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          INST_IDENTITY=$(security find-identity -v -p basic "$KEYCHAIN" | grep "Developer ID Installer" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)

          echo "APPLE_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          [ -n "$APP_IDENTITY" ]  && echo "MACOS_CODESIGN_IDENTITY=$APP_IDENTITY" >> "$GITHUB_ENV" && echo "✓ Found Application identity: $APP_IDENTITY"
          [ -n "$INST_IDENTITY" ] && echo "MACOS_INSTALLER_IDENTITY=$INST_IDENTITY" >> "$GITHUB_ENV" && echo "✓ Found Installer identity: $INST_IDENTITY"

          if [ -z "$APP_IDENTITY" ]; then
            echo "⚠ No 'Developer ID Application' certificate found — binaries will NOT be codesigned"
            echo "  Notarization will likely fail. Add a Developer ID Application cert to the P12."
          fi

      - name: Build binary archive
        run: bash scripts/build-binary.sh ${{ matrix.platform }} ${{ matrix.arch }}

      - name: Sign and notarize macOS .pkg
        if: matrix.platform == 'darwin' && env.MACOS_INSTALLER_IDENTITY != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PKG="dist-binary/markus-v${VERSION}-darwin-${{ matrix.arch }}.pkg"
          PKG_SIGNED="dist-binary/markus-v${VERSION}-darwin-${{ matrix.arch }}-signed.pkg"
          FIXED="dist-binary/markus-setup-darwin-${{ matrix.arch }}.pkg"

          echo "Signing .pkg with: $MACOS_INSTALLER_IDENTITY"
          productsign --sign "$MACOS_INSTALLER_IDENTITY" --keychain "$APPLE_KEYCHAIN" "$PKG" "$PKG_SIGNED"
          mv "$PKG_SIGNED" "$PKG"
          cp "$PKG" "$FIXED"

          # Notarize (non-fatal: .pkg is still usable without notarization)
          SUBMISSION_OUT=$(xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600 2>&1) || true
          echo "$SUBMISSION_OUT"

          SUBMISSION_ID=$(echo "$SUBMISSION_OUT" | grep "id:" | head -1 | awk '{print $2}')
          if echo "$SUBMISSION_OUT" | grep -q "status: Invalid"; then
            echo "⚠ Notarization failed — fetching log for details:"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1 || true
            echo "⚠ .pkg is signed but NOT notarized. Users will see a Gatekeeper warning."
            echo "  To fix: add a 'Developer ID Application' cert to APPLE_CERTIFICATE_P12."
          else
            # Staple the notarization ticket
            xcrun stapler staple "$PKG"
            cp "$PKG" "$FIXED"
            echo "✓ Signed and notarized: $PKG"
          fi

      - name: Cleanup Apple keychain
        if: always() && matrix.platform == 'darwin' && env.APPLE_KEYCHAIN != ''
        run: security delete-keychain "$APPLE_KEYCHAIN" 2>/dev/null || true

      - name: Upload versioned installer
        uses: actions/upload-artifact@v4
        with:
          name: markus-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist-binary/markus-v*-${{ matrix.platform }}-${{ matrix.arch }}.*
            !dist-binary/markus-v*-${{ matrix.platform }}-${{ matrix.arch }}/
          retention-days: 5

      - name: Upload fixed-name installer (for /releases/latest/download/)
        uses: actions/upload-artifact@v4
        with:
          name: markus-setup-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist-binary/markus-setup-${{ matrix.platform }}-${{ matrix.arch }}.*
          retention-days: 5

  github-release:
    runs-on: ubuntu-latest
    needs: [publish-npm, build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/ || echo "No artifacts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Install

            **Download & double-click** (no prerequisites, includes Node.js runtime):

            | Platform | Installer |
            |----------|-----------|
            | Windows x64 | [markus-setup-win-x64.exe](https://github.com/markus-global/markus/releases/download/v${{ steps.version.outputs.VERSION }}/markus-setup-win-x64.exe) |
            | macOS Apple Silicon | [markus-setup-darwin-arm64.pkg](https://github.com/markus-global/markus/releases/download/v${{ steps.version.outputs.VERSION }}/markus-setup-darwin-arm64.pkg) |
            | macOS Intel | [markus-setup-darwin-x64.pkg](https://github.com/markus-global/markus/releases/download/v${{ steps.version.outputs.VERSION }}/markus-setup-darwin-x64.pkg) |
            | Linux x64 (.deb) | [markus-setup-linux-x64.deb](https://github.com/markus-global/markus/releases/download/v${{ steps.version.outputs.VERSION }}/markus-setup-linux-x64.deb) |

            **Or via terminal:**
            ```bash
            # macOS / Linux
            curl -fsSL https://markus.global/install.sh | bash

            # Windows (PowerShell)
            irm https://markus.global/install.ps1 | iex

            # npm (if you already have Node.js 22+)
            npm install -g @markus-global/cli@${{ steps.version.outputs.VERSION }}
            ```
