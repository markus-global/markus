  #         tags: |
  #           markus/markus:${{ steps.version.outputs.VERSION }}
  #           markus/markus:latest
  #         cache-from: type=gha
  #         cache-to: type=gha,mode=max

  build-binaries:
    needs: publish-npm
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build Web UI
        run: pnpm --filter @markus/web-ui build

      - name: Bundle CLI for publishing
        run: pnpm --filter @markus-global/cli build:bundle

      - name: Build binary archive
        run: bash scripts/build-binary.sh ${{ matrix.platform }} ${{ matrix.arch }}

      - name: Upload versioned installer
        uses: actions/upload-artifact@v4
        with:
          name: markus-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist-binary/markus-v*-${{ matrix.platform }}-${{ matrix.arch }}.*
            !dist-binary/markus-v*-${{ matrix.platform }}-${{ matrix.arch }}/
          retention-days: 5

      - name: Upload fixed-name installer (for /releases/latest/download/)
        uses: actions/upload-artifact@v4
        with:
          name: markus-setup-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist-binary/markus-setup-${{ matrix.platform }}-${{ matrix.arch }}.*
          retention-days: 5

  github-release:
    runs-on: ubuntu-latest
    needs: [publish-npm, build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/ || echo "No artifacts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Install

            **Download & double-click** (no prerequisites, includes Node.js runtime):

            | Platform | Installer |
            |----------|-----------|
            | Windows x64 | [markus-setup-win-x64.exe](https://github.com/markus-global/markus/releases/download/v${{ steps.version.outputs.VERSION }}/markus-setup-win-x64.exe) |
            | macOS Apple Silicon | [markus-setup-darwin-arm64.pkg](https://github.com/markus-global/markus/releases/download/v${{ steps.version.outputs.VERSION }}/markus-setup-darwin-arm64.pkg) |
            | macOS Intel | [markus-setup-darwin-x64.pkg](https://github.com/markus-global/markus/releases/download/v${{ steps.version.outputs.VERSION }}/markus-setup-darwin-x64.pkg) |
            | Linux x64 (.deb) | [markus-setup-linux-x64.deb](https://github.com/markus-global/markus/releases/download/v${{ steps.version.outputs.VERSION }}/markus-setup-linux-x64.deb) |

            **Or via terminal:**
            ```bash
            # macOS / Linux
            curl -fsSL https://markus.global/install.sh | bash

            # Windows (PowerShell)
            irm https://markus.global/install.ps1 | iex

            # npm (if you already have Node.js 22+)
            npm install -g @markus-global/cli@${{ steps.version.outputs.VERSION }}
            ```
